<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Flight Instrument Simulator</title>
	
	<style>
		@font-face {
			font-family: "titleFont";
			src: url(https://u-12031.github.io/0_data/fonts/GlowSansJ-Normal-Light.otf);
		}
		@font-face {
			font-family: "originalFont";
			src: url(/0_data/fonts/B612Mono-Regular.ttf) format("truetype");
			/* src: url(https://u-12031.github.io/0_data/fonts/GlowSansJ-Normal-Light.otf); */
			src: url(https://u-12031.github.io/0_data/fonts/MPLUS1p-Regular.ttf) format("truetype");
			/* CodeSwing用。あとで消す */
		}

		body {
			margin: 0;
			background-color: #222;
		}

		* {
			color: white;
			font-family: "originalFont";
		}

		@keyframes titleAni {
			from {letter-spacing: 10px; opacity: 0;}
			to {letter-spacing: 3px; opacity: 1;}
		}

		h1#title {
			font-family: "titleFont";
			margin: 10px;
			letter-spacing: 3px;
			font-size: 2.5rem;
			white-space: nowrap;
			animation: titleAni 1s .3s cubic-bezier(0, .55, .45, 1) forwards;
			opacity: 0; /* 初期値として */
		}

		@keyframes fadeIn {
			from {
				width: min(350px, 100vw);
				opacity: 0;
			}
			50% {opacity: 1;}
			to {
				width: min(320px, 100vw);
				opacity: 1;
			}
		}

		#guidance {
			opacity: 0; /* 初期値として */
			margin-bottom: 0;
			font-size: 1.5em;
			animation: fadeIn .8s calc(var(--animation-index) * .2s + 1.3s) cubic-bezier(0, .55, .45, 1) forwards;
		}

		#bts, #detail {
			display: inline-block;
			vertical-align: top;
		}

		#bts {
			width: min(340px, 100vw);
			margin-right: calc((100vw - min(340px, 100vw) - 800px) / 2);
		}

		#bts button {
			position: relative;
			display: inline-block;
			width: min(320px, 100vw);
			padding: 5px;
			padding-right: 30px;
			margin: 20px 0;
			font-size: 2.5rem;
			text-decoration: none;
			letter-spacing: 1px;
			text-align: end;
			background-color: #223a55;
			border: 0;
			border-top-right-radius: 1000px;
			border-bottom-right-radius: 1000px;
			cursor: pointer;
			opacity: 0; /* 初期値として */
			pointer-events: none; /* 初期値として */
			animation: fadeIn .8s calc(var(--animation-index) * .2s + 1.3s) cubic-bezier(0, .55, .45, 1) forwards;
			transition: all .3s;

			&::before {
				content: "Click again to choose";
				opacity: 0; /* スマホやタブレットの時のみ表示する */
				pointer-events: none;
				position: absolute;
				bottom: -10px;
				right: 30px;
				font-size: .5em;
				white-space: pre;
				transition: all .3s;
			}

			&:hover {
				background-color: #224a60;
				width: min(340px, 100vw);
			}
		}

		#detailImg {
			clip-path: polygon(100px 0, 700px 0, 700px 100%, 100px 100%);
		}

		#detailText {
			font-family: "titleFont";
			font-weight: light;
			text-align: center;
			font-size: 1.4rem;
			letter-spacing: .5px;
			width: 800px;
		}
	</style>
</head>
<body>
	<h1 id="title">FLIGHT INSTRUMENT SIMULATOR</h1>
	<p id="guidance" style="--animation-index: 0;">Choose a Mode</p>
	<div id="bts">
		<button data-link="standard/" style="--animation-index: 2;" data-value="standard">Standard</button>
		<button data-link="advanced/" style="--animation-index: 3;" data-value="advanced">Advanced</button>
		<button data-link="camera/" style="--animation-index: 4;" data-value="camera">Camera</button>
	</div>
	<div id="detail">
		<img id="detailImg" width="800"><!-- clip-pathによって実際に横幅は600pxになる -->
		<p id="detailText"></p>
	</div>
	<script>
		function el(id) {return document.getElementById(id)}
		const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
		let isFocused = false;

		const detailText = {
			standard: "A mode that closely resembles the instruments of a real airplane.<br>The initial settings are the same as those on an airplane, so it may not be suitable for everyday use.",
			advanced: "This mode offers more features, is easier to use, and allows for a wider range of settings compared to the standard mode.<br>This mode is suitable for everyday use.",
			camera: "This mode uses video captured by the camera as the background to achieve a simplified form of augmented reality (AR).<br>While it offers a more immersive experience, it may consume more battery power."
		};
		document.querySelectorAll("#bts button").forEach((bt, i) => {
			const value = bt.dataset.value;

			bt.addEventListener("mouseenter", () => {
				const imgPath = `data/${value}Sample.svg`;
				el("detailImg").src = imgPath;
				el("detailText").innerHTML = detailText[value];
			});
			if(isMobile) { // モバイルではカーソルの移動ができないので、hoverではなくクリックで詳細を表示する。　そのため、2回クリックすることでページに移動させている
				document.styleSheets[0].insertRule(`
				#bts button:focus::before {
					opacity: 1;
					translate: 0 1em;
				}`, 0);
				bt.addEventListener("click", () => {
					if(isFocused === value) {
						window.location.href = value + "/";
					} else {
						isFocused = value;
					}
				});
				bt.addEventListener("blur", () => {
					isFocused = false;
				});
			}
		});
		setTimeout(() => {
			document.querySelectorAll("#bts button").forEach((bt, i) => {
				bt.style.animation = "none";
				bt.style.opacity = 1;
				bt.style.pointerEvents = "all";
			});
		}, 2500);
	</script>
</body>
</html>
