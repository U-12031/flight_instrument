<!DOCTYPE html>
<html>
<head>
	<title></title>

	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="instruments">
		<div id="speedMeter">
			<div class="settings" data-bottom="20" data-left="40-">
				<span>
					DIVISION SIZE
					<div class="valueWithSpinBt" id="speedDivisionSize" data-possible-values="1,2,5,10,20,50,100" data-value="10"></div>
				</span>
			</div>
			<canvas id="speedScale" width="90" height="600"></canvas>
			<div id="speedNumParent">
				<div class="settings" data-left="20" data-top="-20-" style="grid-template-columns: 1fr 1fr;gap: 10px;">
					<span style="grid-column: 1 / 3;">UNIT TYPE
						<div class="valueWithLRBt" id="speedUnitType" data-possible-values='kn,km/h,m/s,MPH' data-value="kn"></div>
					</span>
					<span>DEVICE-MOTION
						<input type="checkbox" class="toggleBt" id="speedUseDeviceMotion" checked></input>
					</span>
					<span>OFFSET
						<div class="rewritableVal" id="speedDeviceMotionOffset" data-step="0.001" data-value="0.0"></div>
					</span>
				</div>
				<span>
					<span id="speedOtherPlaces">18</span>
					<span id="speedOncePlace">
						<span class="oncePlaceTop" id="speedOncePlaceTop">1</span>
						<span class="oncePlaceMiddle" id="speedOncePlaceMiddle">0</span>
						<span class="oncePlaceBottom" id="speedOncePlaceBottom">9</span>
					</span>
				</span>
			</div>
		</div>
		<div id="center">
			<div class="settings" data-right="20" data-bottom="20" style="grid-template-columns: 1fr 1fr;gap: 10px;">
				<span style="grid-column: 1/3;">BETA ←→ GAMMA
					<input type="checkbox" class="toggleBt" id="reverseBetaGamma"></input>
				</span>
				<span style="grid-column: 1/2;">BETA OFFSET
					<div class="rewritableVal" id="betaOffset" data-step="0.1" data-value="0.0"></div>
				</span>
				<span>GAMMA OFFSET
					<div class="rewritableVal" id="gammaOffset" data-step="0.1" data-value="0.0"></div>
				</span>
				<span style="grid-column: 1/3;">(CAMERA ONLY)<br>VERTICAL TRANSLATE
					<input id="centerVerticalTranslate" type="range" min="-60" max"20" value="0" style="width: 100px;" oninput="el('high').style.translate = el('symbol').style.translate = `-50% calc(-50% + ${-el('centerVerticalTranslate').value}px)`">
				</span>
			</div>
			<div id="ground"></div>
			<div id="high">
				<canvas id="highScale" width="1400" height="1400"></canvas>
			</div>
			<div id="bank">
				<canvas id="bankScale" width="400" height="250"></canvas>
				<canvas id="bankPointer" width="400" height="225"></canvas>
			</div>
			<canvas id="symbol" width="400" height="430"></canvas>
		</div>
		<div id="altitudeMeter">
			<div class="settings" data-bottom="20" data-right="40-">
				<span>DIVISION SIZE
					<div class="valueWithSpinBt" id="altitudeScaleDivisionSize" data-possible-values="1,2,5,10,20,50,100" data-value="20"></div>
				</span>
			</div>
			<canvas id="altitudeScale" width="90" height="600"></canvas>
			<div id="altitudeNumParent">
				<div class="settings" data-left="250-" data-top="-20-" style="grid-template-columns: 1fr 1fr;gap: 10px;">
					<span>UNIT TYPE
						<div class="valueWithLRBt" id="altitudeUnitType" data-possible-values='ft,m,km' data-value="ft"></div>
					</span>
					<span>DIVISION SIZE
						<div class="valueWithSpinBt" id="altitudeDivisionSize" data-possible-values="1,10" data-value="10"></div>
					</span>
				</div>
				<span>
					<span id="altitudeOtherPlaces">128</span>
					<span id="altitudeTwoPlaces">
						<span class="oncePlaceTop" id="altitudeOncePlaceTop">20</span>
						<span class="oncePlaceMiddle" id="altitudeOncePlaceMiddle">00</span>
						<span class="oncePlaceBottom" id="altitudeOncePlaceBottom">80</span>
					</span>
				</span>
			</div>
		</div>
		<div id="heading">
			<div class="settings" data-top="50-" data-right="140">
				<span>OFFSET
					<div class="rewritableVal" id="headingOffset" data-step="0.1" data-value="0.0"></div>
				</span>
			</div>
			<canvas id="headingScale" width="600" height="600"></canvas>
			<canvas id="headingPointer" width="600" height="50"></canvas>
		</div>
		<button id="startSensors" onclick="startSensors()">Start using Sensors</button>
		<button id="enableCamera" onclick="enableCamera()">Enable Camera</button>
		<video id="camera" autoplay playsinline></video>
		<img id="settingsImg" src="data/settingsImg.svg" width="50" onclick="settingsDisplay()">
	</div>
	<br><br><br><br>TEST<br>
	<br>Alpha: <span id="outputAlpha">0</span>
	<br>Beta: <span id="outputBeta">0</span>
	<br>Gamma: <span id="outputGamma">0</span>
	<br>Altitude: <span id="outputAltitude">0</span>
	<br>Speed: <span id="outputSpeed">0</span>
	<br>Heading: <span id="outputHeading">0</span>

	<script src="script.js"></script>
</body>
</html>
